name: rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint-and-test:
    name: lint + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: probe lock drift (debug)
        run: |
          cargo update --workspace --dry-run --verbose || true
          cargo tree -e features --workspace --depth 0 || true
          cargo --version
      - name: cargo fetch (validate lockfile)
        run: cargo fetch --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --frozen -- -D warnings

      - name: cargo build
        run: cargo build --workspace --frozen

      - name: cargo test
        run: cargo test --workspace --frozen

      - name: file-length cap (Linux only — bash check)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/check-file-length.sh crates

  supply-chain:
    name: cargo-deny + cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-supply-chain-${{ hashFiles('**/Cargo.lock') }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete
      - run: cargo deny --all-features check
      - run: cargo machete --with-metadata
