name: benchmarks

on:
  workflow_dispatch:
    inputs:
      backend:
        description: "Recall backend to benchmark"
        required: true
        default: "local-chroma-sqlite"
        type: choice
        options:
          - local-chroma-sqlite
          - no-memory
      bench:
        description: "Single benchmark to run (empty = full suite)"
        required: false
        default: ""
        type: string
      smoke:
        description: "Run smoke slice only (no full corpus download)"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  bench:
    name: ${{ inputs.bench || 'full-suite' }} (${{ inputs.backend }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench

      - name: Install Python + uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Sync Python workspace
        run: cd python && uv sync --all-groups

      - name: Download corpus
        if: ${{ !inputs.smoke }}
        run: |
          pip install huggingface_hub[cli]
          bash benchmarks/corpus/longmemeval.sh
          bash benchmarks/corpus/memory-agent-bench.sh
          bash benchmarks/corpus/mteb-retrieval.sh

      - name: Build stoa-bench
        run: cargo build -p stoa-bench --release --locked

      - name: Run benchmark
        env:
          BENCH_BACKEND: ${{ inputs.backend }}
          BENCH_NAME: ${{ inputs.bench }}
          BENCH_SMOKE: ${{ inputs.smoke }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p benchmarks/results
          BENCH_ARG=""
          if [ -n "${BENCH_NAME}" ]; then
            BENCH_ARG="--bench ${BENCH_NAME}"
          fi
          SMOKE_ARG=""
          if [ "${BENCH_SMOKE}" = "true" ]; then
            SMOKE_ARG="--smoke"
          fi
          # shellcheck disable=SC2086
          cargo run -p stoa-bench --release --locked -- \
            --backend "${BENCH_BACKEND}" \
            --output benchmarks/results \
            ${BENCH_ARG} \
            ${SMOKE_ARG}

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results-${{ github.run_id }}
          path: benchmarks/results/*.json
          if-no-files-found: warn
