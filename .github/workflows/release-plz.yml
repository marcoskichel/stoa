name: release-plz

on:
  push:
    branches: [main]

# release-plz needs to read commit history + write tags + create PRs.
# Job-level permissions tighten each step beyond what the workflow-level
# default grants.
permissions:
  contents: read

jobs:
  # Cuts tags + publishes to crates.io + opens GitHub Releases once the
  # release PR is merged. Runs on every push to main but no-ops unless
  # the most recent merge was the release PR.
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/[email protected]
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens/updates the release PR with version bumps + CHANGELOG entries
  # generated from Conventional Commits since the last tag. Maintainer
  # reviews the diff, edits prose if needed, then merges to trigger the
  # release job above.
  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/[email protected]
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
