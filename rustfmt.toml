# Stable rustfmt options only. Run with `cargo fmt`.
edition = "2024"
style_edition = "2024"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_field_init_shorthand = true
use_try_shorthand = true
match_block_trailing_comma = true
chain_width = 60
fn_call_width = 80
struct_lit_width = 30
struct_variant_width = 35
single_line_if_else_max_width = 50
