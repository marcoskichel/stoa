# Cross-rs config for the M0 spike.
# Target: ensure the v0.1 dependency set (rusqlite bundled) cross-compiles
# from Linux x86_64 host to all 5 release targets.
#
# Note: macOS targets via `cross` require a custom Docker image with the
# macOS SDK (osxcross). Cross does not ship one out of the box because
# Apple's SDK license forbids redistribution. We attempt with the default
# cross image and document where it fails -> needed action for M1.

[build]
default-target = "x86_64-unknown-linux-gnu"
