[project]
name = "stoa-bench-judge"
version = "0.1.0"
description = "LLM judge + cost ledger for Stoa benchmark scoring (LongMemEval, MemoryAgentBench)."
requires-python = ">=3.13"
license = "MIT"
readme = "README.md"
dependencies = [
    "anthropic>=0.50",
]

[project.scripts]
stoa-bench-judge = "stoa_bench_judge.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stoa_bench_judge"]

[tool.pytest.ini_options]
testpaths = ["tests"]
