[project]
name = "stoa-embed"
version = "0.1.0"
description = "Stoa Python sidecar: embeddings (fastembed / sentence-transformers)."
requires-python = ">=3.13"
license = "MIT"
dependencies = ["stoa-shared"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stoa_embed"]
