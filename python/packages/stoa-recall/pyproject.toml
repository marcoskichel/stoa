[project]
name = "stoa-recall"
version = "0.1.0"
description = "Stoa Python sidecar: LocalChromaSqliteBackend (ChromaDB + FTS5 + KG) over the recall.request queue lane."
requires-python = ">=3.13"
license = "MIT"
dependencies = ["stoa-shared", "pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stoa_recall"]
