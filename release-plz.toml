# Release-plz configuration.
#
# Spec: https://release-plz.dev/docs/config
#
# Flow after the pivot:
#   1. Push a Conventional-Commits commit to `main`.
#   2. `release-plz.yml` opens (or updates) a release PR bumping every
#      workspace crate's version + appending changelog entries.
#   3. Merge. Release-plz tags `vX.Y.Z`, publishes each `publish = true`
#      crate to crates.io, and opens a GitHub Release. `release.yml`
#      then builds the cross-platform tarballs.

[workspace]
allow_dirty = false
changelog_update = true
git_release_enable = true
pr_labels = ["release", "automated"]
publish = true
semver_check = true

# Internal-only crate: bump in lockstep, skip publish + release noise.
[[package]]
name = "stoa-doclint"
publish = false
git_release_enable = false
